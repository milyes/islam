<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم - Avec Gemini AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Amiri', system-ui, sans-serif; }
    .quran-text { font-size: 1.35rem; line-height: 2.25; }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-950 to-teal-950 text-white min-h-screen">

  <div class="max-w-4xl mx-auto p-6">
    <!-- En-tête -->
    <div class="text-center mb-10 mt-8">
      <h1 class="text-5xl font-bold text-emerald-300 mb-2">ﷺ القرآن الكريم ﷺ</h1>
      <p class="text-emerald-200 text-xl">Le Noble Coran • Assisté par Google Gemini</p>
    </div>

    <!-- Zone de chat / interaction -->
    <div class="bg-zinc-900 rounded-3xl shadow-2xl overflow-hidden border border-emerald-800">
      
      <!-- En-tête du chat -->
      <div class="bg-emerald-900 px-6 py-4 flex items-center gap-3">
        <i class="fa-solid fa-book-quran text-3xl text-emerald-300"></i>
        <div>
          <h2 class="font-semibold text-lg">Assistant Coranique Intelligent</h2>
          <p class="text-emerald-300 text-sm">Posez vos questions sur le Coran</p>
        </div>
      </div>

      <!-- Messages -->
      <div id="chat" class="h-[520px] overflow-y-auto p-6 space-y-6 bg-zinc-950">
        <!-- Messages seront ajoutés ici par JavaScript -->
      </div>

      <!-- Zone de saisie -->
      <div class="p-6 bg-zinc-900 border-t border-emerald-800">
        <div class="flex gap-3">
          <input 
            id="userInput"
            type="text" 
            class="flex-1 bg-zinc-800 text-white rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            placeholder="Exemple : Explique-moi la sourate Al-Fatiha... ou Donne-moi le verset 255 de la sourate Al-Baqara"
            onkeypress="if(event.key === 'Enter') sendMessage()">
          
          <button 
            onclick="sendMessage()"
            class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-2xl transition flex items-center gap-2 font-medium">
            <i class="fa-solid fa-paper-plane"></i>
            <span>Envoyer</span>
          </button>
        </div>
        
        <div class="text-center mt-4">
          <input 
            id="apiKey"
            type="password" 
            class="bg-zinc-800 text-xs px-4 py-2 rounded-xl w-80 text-center focus:outline-none"
            placeholder="Collez ici votre clé Gemini API (GEMINI_API_KEY)"
            value="">
          <p class="text-[10px] text-zinc-500 mt-1">Votre clé reste uniquement dans votre navigateur</p>
        </div>
      </div>
    </div>

    <!-- Suggestions rapides -->
    <div class="mt-8 grid grid-cols-2 md:grid-cols-3 gap-3">
      <button onclick="quickAsk(this)" class="bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl text-left transition">
        <strong class="text-emerald-400">Sourate Al-Fatiha</strong><br>
        <span class="text-sm text-zinc-400">Explique-moi cette sourate</span>
      </button>
      <button onclick="quickAsk(this)" class="bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl text-left transition">
        <strong class="text-emerald-400">Ayat Al-Kursi</strong><br>
        <span class="text-sm text-zinc-400">Verset 255 de Al-Baqara</span>
      </button>
      <button onclick="quickAsk(this)" class="bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl text-left transition">
        <strong class="text-emerald-400">Thème du Ramadan</strong><br>
        <span class="text-sm text-zinc-400">Versets sur le jeûne</span>
      </button>
    </div>
  </div>

  <script>
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const apiKeyInput = document.getElementById('apiKey');

    // Message d'accueil
    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      
      if (isUser) {
        msg.innerHTML = `
          <div class="max-w-[80%] bg-emerald-600 text-white px-5 py-3 rounded-3xl rounded-tr-none">
            ${text}
          </div>`;
      } else {
        msg.innerHTML = `
          <div class="max-w-[80%] bg-zinc-800 px-5 py-3 rounded-3xl rounded-tl-none quran-text">
            ${text}
          </div>`;
      }
      chatDiv.appendChild(msg);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // Message initial
    window.onload = () => {
      addMessage("السلام عليكم ورحمة الله وبركاته<br><br>Je suis votre assistant coranique alimenté par Gemini.<br>Comment puis-je vous aider aujourd’hui ?", false);
    };

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        alert("Veuillez entrer votre clé API Gemini d’abord.");
        return;
      }

      addMessage(question, true);
      input.value = '';

      // Message "en train d'écrire"
      const loadingId = 'loading-' + Date.now();
      const loadingMsg = document.createElement('div');
      loadingMsg.id = loadingId;
      loadingMsg.className = "flex justify-start";
      loadingMsg.innerHTML = `
        <div class="bg-zinc-800 px-5 py-3 rounded-3xl rounded-tl-none">
          <i class="fa-solid fa-spinner fa-spin"></i> Gemini réfléchit...
        </div>`;
      chatDiv.appendChild(loadingMsg);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `Tu es un savant musulman expert en tafsir, fiqh et sciences coraniques. 
                Réponds toujours avec respect, précision et en citant les versets en arabe quand c'est pertinent.
                Réponds en français sauf si l'utilisateur demande en arabe.
                Question de l'utilisateur : ${question}`
              }]
            }]
          })
        });

        const data = await response.json();
        
        // Supprimer le message de chargement
        document.getElementById(loadingId).remove();

        if (data.candidates && data.candidates[0]) {
          let answer = data.candidates[0].content.parts[0].text;
          answer = answer.replace(/\n/g, '<br>');
          addMessage(answer, false);
        } else {
          addMessage("Désolé, je n'ai pas pu obtenir de réponse de Gemini. Vérifiez votre clé API.", false);
        }

      } catch (err) {
        document.getElementById(loadingId).remove();
        addMessage("Erreur de connexion. Vérifiez votre clé API et votre connexion internet.", false);
        console.error(err);
      }
    }

    // Fonction pour les boutons de suggestions
    function quickAsk(btn) {
      input.value = btn.textContent.trim();
      sendMessage();
    }
  </script>
</body>
</html>
